name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Coda loads coda.config.ts via native Node.js type stripping, which
      # requires Node >= 22.18 / 24. Pin a supported version for the native
      # config-load verification step below.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages
        run: bun run build:ci

      # oxlint runs with typeAware + typeCheck, so this both lints and
      # type-checks every package/client (replacing the old biome + eslint
      # pass). The build above produces the .d.ts files tsgolint needs for
      # cross-package type resolution. oxfmt --check enforces formatting.
      - name: Run oxlint (lint + type-check) and check formatting
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Typecheck coda.config.ts files
        run: bun run typecheck

      # Gate the native Node.js config-load path: run the compiled CLI with
      # `node` directly (not bun) against every client so each coda.config.ts
      # must load and apply its visitors via native type stripping. `idl` is
      # non-destructive (prints to stdout, writes no files).
      - name: Verify coda.config.ts loads under native Node
        run: |
          for dir in clients/*/; do
            echo "== ${dir} =="
            ( cd "${dir}" && node "${GITHUB_WORKSPACE}/packages/coda/dist/bin/cli.js" idl > /dev/null )
          done
